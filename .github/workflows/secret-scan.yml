name: Qu√©t b√≠ m·∫≠t

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  secret_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (PR)
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Checkout (push)
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: ƒê·∫£m b·∫£o commit before t·ªìn t·∫°i
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          BEFORE="${{ github.event.before }}"
          if [ -n "${BEFORE}" ] && ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            git fetch --no-tags --prune --depth=0 origin "${BEFORE}"
          fi
      - name: Ki·ªÉm tra file ignore t·ªìn t·∫°i
        run: |
          test -f .gitleaksignore
          sed -n '1,200p' .gitleaksignore
      - name: C√Ýi gitleaks CLI (v8.24.3)
        shell: bash
        run: |
          set -euo pipefail
          curl -sSL -o /tmp/gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Qu√©t b√≠ m·∫≠t b·∫±ng gitleaks (fallback n·∫øu thi·∫øu commit)
        id: gitleaks_scan
        shell: bash
        continue-on-error: true
        run: |
          set -euo pipefail
          SARIF_PATH="${RUNNER_TEMP}/gitleaks/results.sarif"
          mkdir -p "$(dirname "$SARIF_PATH")"
          RANGE=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            if [ -n "${BASE}" ] && [ -n "${HEAD}" ]; then
              if git cat-file -e "${BASE}^{commit}" 2>/dev/null && git cat-file -e "${HEAD}^{commit}" 2>/dev/null; then
                RANGE="${BASE}..${HEAD}"
              fi
            fi
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
            if [ -n "${BEFORE}" ] && [ "${BEFORE}" != "0000000000000000000000000000000000000000" ]; then
              if git cat-file -e "${BEFORE}^{commit}" 2>/dev/null && git cat-file -e "${AFTER}^{commit}" 2>/dev/null; then
                RANGE="${BEFORE}..${AFTER}"
              fi
            fi
          fi
          ARGS=(
            --redact
            --gitleaks-ignore-path=.gitleaksignore
            --report-format=sarif
            --report-path="${SARIF_PATH}"
            --log-level=info
          )
          if [ -f ".gitleaks.toml" ]; then
            ARGS=(--config=.gitleaks.toml "${ARGS[@]}")
          fi
          code=0
          if [ -n "${RANGE}" ]; then
            gitleaks detect "${ARGS[@]}" --log-opts="${RANGE}" || code=$?
          else
            gitleaks detect "${ARGS[@]}" || code=$?
          fi
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          echo "sarif_path=${SARIF_PATH}" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Ki·ªÉm tra file SARIF tr∆∞·ªõc khi t·∫£i
        if: always()
        shell: bash
        run: |
          sarif_path="${{ steps.gitleaks_scan.outputs.sarif_path }}"
          if [ -n "${sarif_path}" ] && [ -f "${sarif_path}" ]; then
            echo "T√¨m th·∫•y ${sarif_path}; s·∫Ω upload artifact."
          else
            echo "Kh√¥ng t√¨m th·∫•y file SARIF ƒë·ªÉ upload (sarif_path=${sarif_path:-<empty>})."
          fi
      - name: T·∫£i k·∫øt qu·∫£ gitleaks
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-gitleaks
          if-no-files-found: warn
          path: ${{ steps.gitleaks_scan.outputs.sarif_path }}
      - name: ƒê√°nh gi√° k·∫øt qu·∫£ gitleaks
        shell: bash
        run: |
          export SARIF_PATH="${{ steps.gitleaks_scan.outputs.sarif_path }}"
          export EXIT_CODE="${{ steps.gitleaks_scan.outputs.exit_code }}"
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const sarifPath = process.env.SARIF_PATH || 'results.sarif';
          const exitCode = process.env.EXIT_CODE || '0';

          function normalize(u) {
            let s = String(u || '');
            s = s.split('\\').join('/');
            while (s.startsWith('./')) s = s.slice(2);
            return s;
          }

          const sarifExists = !!sarifPath && fs.existsSync(sarifPath);
          let findingsTotal = 0;
          let selfHitCount = 0;
          let findingsFiltered = 0;
          const top = [];
          let parseError = '';

          if (sarifExists) {
            try {
              const raw = fs.readFileSync(sarifPath, 'utf8');
              const d = JSON.parse(raw);
              const reportBase = path.posix.basename(normalize(sarifPath));
              const runs = Array.isArray(d.runs) ? d.runs : [];
              for (const run of runs) {
                const results = Array.isArray(run.results) ? run.results : [];
                for (const r of results) {
                  const loc = r.locations?.[0]?.physicalLocation || {};
                  const uri = normalize(loc.artifactLocation?.uri || '');
                  const line = loc.region?.startLine || '';
                  const ruleId = r.ruleId || '';
                  const isSelf = uri === reportBase;

                  findingsTotal += 1;
                  if (isSelf) selfHitCount += 1;
                  else findingsFiltered += 1;

                  if (top.length < 5) {
                    top.push({ ruleId, uri, line, self: isSelf });
                  }
                }
              }
            } catch (e) {
              parseError = e && e.message ? e.message : String(e);
            }
          }

          console.log(`exit_code=${exitCode}`);
          console.log(`sarif_path=${sarifPath}`);
          console.log(`sarif_exists=${sarifExists}`);
          console.log(`findings_total=${findingsTotal}`);
          console.log(`self_hit_count=${selfHitCount}`);
          console.log(`findings_count_filtered=${findingsFiltered}`);
          console.log('Top findings metadata (t·ªëi ƒëa 5):');
          if (top.length === 0) {
            console.log('(kh√¥ng c√≥ metadata finding ƒë·ªÉ in)');
          } else {
            for (const t of top) {
              console.log(`ruleId=${t.ruleId}; uri=${t.uri}; line=${t.line}; self=${t.self}`);
            }
          }

          const code = String(exitCode || '0');
          const infraCode = Number(code) || 1;
          if (parseError) {
            console.log(`L·ªói parse SARIF: ${parseError}`);
            console.log(`Gitleaks l·ªói h·∫° t·∫ßng/c·∫•u h√¨nh (code=${infraCode}).`);
            process.exit(infraCode);
          }
          if (findingsFiltered > 0) {
            console.log('Ph√°t hi·ªán b√≠ m·∫≠t, d·ª´ng workflow.');
            process.exit(2);
          }
          if (findingsTotal > 0 && selfHitCount === findingsTotal) {
            console.log('Ch·ªâ t·ª±-d√≠nh trong file b√°o c√°o, b·ªè qua.');
            process.exit(0);
          }
          if (code !== '' && code !== '0') {
            console.log(`Gitleaks l·ªói h·∫° t·∫ßng/c·∫•u h√¨nh (code=${infraCode}).`);
            process.exit(infraCode);
          }
          console.log('Kh√¥ng c√≥ ph√°t hi·ªán, ti·∫øp t·ª•c.');
          process.exit(0);
          NODE
