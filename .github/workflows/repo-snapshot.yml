name: Repo Snapshot

on:
  pull_request:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ops-commit
  cancel-in-progress: false

jobs:
  snapshot_pr:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node tools/repo_snapshot.mjs
      - run: node tools/repo_textdump.mjs
      - name: Đảm bảo commit before tồn tại
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          BEFORE="${{ github.event.before }}"
          if [ -n "${BEFORE}" ] && ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            git fetch --no-tags --prune --depth=0 origin "${BEFORE}"
          fi
      - name: Cài gitleaks CLI (v8.24.3)
        shell: bash
        run: |
          set -euo pipefail
          curl -sSL -o /tmp/gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Chuẩn bị commit range cho gitleaks (tự chữa)
        id: gitleaks_range
        shell: bash
        run: |
          set -euo pipefail
          git rev-parse --is-shallow-repository
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          RANGE=""
          if [ -n "${BASE}" ] && [ -n "${HEAD}" ]; then
            if git cat-file -e "${BASE}^{commit}" 2>/dev/null && git cat-file -e "${HEAD}^{commit}" 2>/dev/null; then
              RANGE="${BASE}..${HEAD}"
            fi
          fi
          if [ -z "${RANGE}" ]; then
            echo "range=" >> "$GITHUB_OUTPUT"
          else
            echo "range=${RANGE}" >> "$GITHUB_OUTPUT"
          fi
      - name: Debug gitleaks range
        shell: bash
        run: |
          echo "Gitleaks commit range: '${{ steps.gitleaks_range.outputs.range }}'"
      - name: Dọn file SARIF cũ trước khi quét
        shell: bash
        run: |
          set -euo pipefail
          echo "Quét workspace tìm *.sarif/results.sarif"
          find . -maxdepth 6 -type f \( -name "results.sarif" -o -name "*.sarif" \) -print || true
          echo "Xóa các file SARIF cũ trong workspace"
          find . -maxdepth 6 -type f \( -name "results.sarif" -o -name "*.sarif" \) -delete
          echo "Danh sách SARIF còn lại sau dọn:"
          find . -maxdepth 6 -type f \( -name "results.sarif" -o -name "*.sarif" \) -print || true
      - name: Quét bí mật trước khi xuất snapshot
        id: gitleaks_scan
        shell: bash
        continue-on-error: true
        run: |
          set -euo pipefail
          SARIF_PATH="${RUNNER_TEMP}/gitleaks/results.sarif"
          mkdir -p "$(dirname "$SARIF_PATH")"
          RANGE="${{ steps.gitleaks_range.outputs.range }}"
          code=0
          if [ -n "${RANGE}" ]; then
            gitleaks detect --redact --config=.gitleaks.toml --gitleaks-ignore-path=.gitleaksignore --report-format=sarif --report-path="${SARIF_PATH}" --log-level=info --log-opts="${RANGE}" || code=$?
          else
            gitleaks detect --redact --config=.gitleaks.toml --gitleaks-ignore-path=.gitleaksignore --report-format=sarif --report-path="${SARIF_PATH}" --log-level=info || code=$?
          fi
          echo "sarif_path=${SARIF_PATH}" >> "$GITHUB_OUTPUT"
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
      - name: Kiểm tra file SARIF trước khi tải
        if: always()
        shell: bash
        run: |
          sarif_path="${{ steps.gitleaks_scan.outputs.sarif_path }}"
          if [ -n "${sarif_path}" ] && [ -f "${sarif_path}" ]; then
            echo "Tim thay ${sarif_path}; se upload artifact."
          else
            echo "Khong tim thay file SARIF de upload (sarif_path=${sarif_path:-<empty>})."
          fi
      - name: Tải kết quả gitleaks
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-snapshot-gitleaks
          if-no-files-found: warn
          path: ${{ steps.gitleaks_scan.outputs.sarif_path }}
      - name: Đánh giá kết quả gitleaks
        shell: bash
        run: |
          export SARIF_PATH="${{ steps.gitleaks_scan.outputs.sarif_path }}"
          export EXIT_CODE="${{ steps.gitleaks_scan.outputs.exit_code }}"
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const sarifPath = process.env.SARIF_PATH || process.argv[1] || 'results.sarif';
          const exitCode = process.env.EXIT_CODE || '0';

          function normalize(u) {
            let s = String(u || '');
            s = s.split('\\').join('/');
            while (s.startsWith('./')) s = s.slice(2);
            return s;
          }

          const sarifExists = !!sarifPath && fs.existsSync(sarifPath);
          let findings = 0;
          const top = [];

          if (sarifExists) {
            try {
              const raw = fs.readFileSync(sarifPath, 'utf8');
              const d = JSON.parse(raw);
              const reportBase = path.posix.basename(normalize(sarifPath));
              const runs = Array.isArray(d.runs) ? d.runs : [];

              for (const run of runs) {
                const results = Array.isArray(run.results) ? run.results : [];
                for (const r of results) {
                  const loc = r.locations?.[0]?.physicalLocation || {};
                  const uri = normalize(loc.artifactLocation?.uri || '');
                  const line = loc.region?.startLine || '';
                  const ruleId = r.ruleId || '';
                  const isSelf = uri === reportBase;

                  if (!isSelf) findings += 1;

                  if (top.length < 5) {
                    top.push({ ruleId, uri, line, self: isSelf });
                  }
                }
              }
            } catch (e) {
              console.error('Loi parse SARIF:', e && e.message ? e.message : e);
              process.exit(1);
            }
          }

          console.log(`exit_code=${exitCode}`);
          console.log(`sarif_path=${sarifPath}`);
          console.log(`sarif_exists=${sarifExists}`);
          console.log(`findings_count_filtered=${findings}`);
          console.log('Top findings metadata (toi da 5):');
          if (top.length === 0) {
            console.log('(khong co metadata finding de in)');
          } else {
            for (const t of top) {
              console.log(`ruleId=${t.ruleId}; uri=${t.uri}; line=${t.line}; self=${t.self}`);
            }
          }

          const code = String(exitCode || '0');
          if (findings > 0) {
            console.log('Phat hien bi mat, dung workflow.');
            process.exit(2);
          } else if (code !== '' && code !== '0') {
            console.log(`Gitleaks loi ha tang/cau hinh (code=${code}).`);
            process.exit(Number(code) || 1);
          } else {
            console.log('Khong co phat hien, tiep tuc.');
            process.exit(0);
          }
          NODE
      - name: Tạo snapshot zip + manifest
        run: |
          bash tools/export_repo_snapshot.sh --mode snapshot
          mkdir -p artifacts
          mv repo_snapshot.zip repo_manifest.txt artifacts/
      - name: Kiểm tra artifacts
        run: |
          ls -la artifacts
          test -f artifacts/repo_snapshot.zip
          test -f artifacts/repo_manifest.txt
      - name: Debug thư mục trước khi upload
        run: |
          pwd
          ls -la
          ls -la artifacts || true
          find artifacts -maxdepth 2 -type f -print || true
      - name: PR snapshot summary
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const data = JSON.parse(fs.readFileSync("DOC/REPO_SNAPSHOT_INDEX.json", "utf8"));
          const ext = Object.entries(data.stats?.extCounts || {})
            .sort((a, b) => b[1] - a[1])
            .slice(0, 5)
            .map(([k, v]) => `- ${k}: ${v}`)
            .join("\n") || "- (kh\u00f4ng c\u00f3)";
          const ignored = [
            ...(data.ignored?.dirs || []).map((p) => `- ${p}/`),
            ...(data.ignored?.partialDirs || []).map((p) => `- ${p}/ (b\u1ecf qua file con)`)
          ];
          const summary = [
            "### \u1ea2nh ch\u1ee5p kho m\u00e3 (Snapshot)",
            `- Tham chi\u1ebfu: ${process.env.GITHUB_REF || ""}`,
            `- T\u1ed5ng s\u1ed1 t\u1ec7p: ${data.stats?.totalFiles ?? 0}`,
            `- T\u1ed5ng s\u1ed1 th\u01b0 m\u1ee5c: ${data.stats?.totalDirs ?? 0}`,
            "",
            "Top 5 \u0111u\u00f4i t\u1ec7p:",
            ext,
            "",
            "Danh s\u00e1ch b\u1ecf qua:",
            ignored.length ? ignored.join("\n") : "- (kh\u00f4ng c\u00f3)",
            "",
            "Artifact: REPO_SNAPSHOT.md"
          ].join("\n");
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary + "\n");
          NODE
      - uses: actions/upload-artifact@v4
        with:
          name: repo-snapshot-index
          if-no-files-found: error
          path: |
            DOC/REPO_SNAPSHOT.md
            DOC/REPO_SNAPSHOT_INDEX.json
            DOC/REPO_SNAPSHOT_FULL.md
            DOC/REPO_SNAPSHOT_FULL_INDEX.json
      - uses: actions/upload-artifact@v4
        with:
          name: repo-snapshot-source
          if-no-files-found: error
          path: |
            artifacts/repo_snapshot.zip
            artifacts/repo_manifest.txt

  snapshot_main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, 'docs(snapshot):') && !contains(github.event.head_commit.message, '[skip snapshot]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node tools/repo_snapshot.mjs
      - run: node tools/repo_textdump.mjs
      - name: Đảm bảo commit before tồn tại
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          BEFORE="${{ github.event.before }}"
          if [ -n "${BEFORE}" ] && ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            git fetch --no-tags --prune --depth=0 origin "${BEFORE}"
          fi
      - name: Cài gitleaks CLI (v8.24.3)
        shell: bash
        run: |
          set -euo pipefail
          curl -sSL -o /tmp/gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Chuẩn bị commit range cho gitleaks (tự chữa)
        id: gitleaks_range
        shell: bash
        run: |
          set -euo pipefail
          git rev-parse --is-shallow-repository
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          RANGE=""
          if [ -n "${BEFORE}" ] && [ -n "${AFTER}" ] && [ "${BEFORE}" != "0000000000000000000000000000000000000000" ]; then
            if git cat-file -e "${BEFORE}^{commit}" 2>/dev/null && git cat-file -e "${AFTER}^{commit}" 2>/dev/null; then
              RANGE="${BEFORE}..${AFTER}"
            fi
          fi
          if [ -z "${RANGE}" ]; then
            echo "range=" >> "$GITHUB_OUTPUT"
          else
            echo "range=${RANGE}" >> "$GITHUB_OUTPUT"
          fi
      - name: Debug gitleaks range
        shell: bash
        run: |
          echo "Gitleaks commit range: '${{ steps.gitleaks_range.outputs.range }}'"
      - name: Dọn file SARIF cũ trước khi quét
        shell: bash
        run: |
          set -euo pipefail
          echo "Quét workspace tìm *.sarif/results.sarif"
          find . -maxdepth 6 -type f \( -name "results.sarif" -o -name "*.sarif" \) -print || true
          echo "Xóa các file SARIF cũ trong workspace"
          find . -maxdepth 6 -type f \( -name "results.sarif" -o -name "*.sarif" \) -delete
          echo "Danh sách SARIF còn lại sau dọn:"
          find . -maxdepth 6 -type f \( -name "results.sarif" -o -name "*.sarif" \) -print || true
      - name: Quét bí mật trước khi xuất snapshot
        id: gitleaks_scan
        shell: bash
        continue-on-error: true
        run: |
          set -euo pipefail
          SARIF_PATH="${RUNNER_TEMP}/gitleaks/results.sarif"
          mkdir -p "$(dirname "$SARIF_PATH")"
          RANGE="${{ steps.gitleaks_range.outputs.range }}"
          code=0
          if [ -n "${RANGE}" ]; then
            gitleaks detect --redact --config=.gitleaks.toml --gitleaks-ignore-path=.gitleaksignore --report-format=sarif --report-path="${SARIF_PATH}" --log-level=info --log-opts="${RANGE}" || code=$?
          else
            gitleaks detect --redact --config=.gitleaks.toml --gitleaks-ignore-path=.gitleaksignore --report-format=sarif --report-path="${SARIF_PATH}" --log-level=info || code=$?
          fi
          echo "sarif_path=${SARIF_PATH}" >> "$GITHUB_OUTPUT"
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
      - name: Kiểm tra file SARIF trước khi tải
        if: always()
        shell: bash
        run: |
          sarif_path="${{ steps.gitleaks_scan.outputs.sarif_path }}"
          if [ -n "${sarif_path}" ] && [ -f "${sarif_path}" ]; then
            echo "Tim thay ${sarif_path}; se upload artifact."
          else
            echo "Khong tim thay file SARIF de upload (sarif_path=${sarif_path:-<empty>})."
          fi
      - name: Tải kết quả gitleaks
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-snapshot-gitleaks
          if-no-files-found: warn
          path: ${{ steps.gitleaks_scan.outputs.sarif_path }}
      - name: Đánh giá kết quả gitleaks
        shell: bash
        run: |
          export SARIF_PATH="${{ steps.gitleaks_scan.outputs.sarif_path }}"
          export EXIT_CODE="${{ steps.gitleaks_scan.outputs.exit_code }}"
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const sarifPath = process.env.SARIF_PATH || process.argv[1] || 'results.sarif';
          const exitCode = process.env.EXIT_CODE || '0';

          function normalize(u) {
            let s = String(u || '');
            s = s.split('\\').join('/');
            while (s.startsWith('./')) s = s.slice(2);
            return s;
          }

          const sarifExists = !!sarifPath && fs.existsSync(sarifPath);
          let findings = 0;
          const top = [];

          if (sarifExists) {
            try {
              const raw = fs.readFileSync(sarifPath, 'utf8');
              const d = JSON.parse(raw);
              const reportBase = path.posix.basename(normalize(sarifPath));
              const runs = Array.isArray(d.runs) ? d.runs : [];

              for (const run of runs) {
                const results = Array.isArray(run.results) ? run.results : [];
                for (const r of results) {
                  const loc = r.locations?.[0]?.physicalLocation || {};
                  const uri = normalize(loc.artifactLocation?.uri || '');
                  const line = loc.region?.startLine || '';
                  const ruleId = r.ruleId || '';
                  const isSelf = uri === reportBase;

                  if (!isSelf) findings += 1;

                  if (top.length < 5) {
                    top.push({ ruleId, uri, line, self: isSelf });
                  }
                }
              }
            } catch (e) {
              console.error('Loi parse SARIF:', e && e.message ? e.message : e);
              process.exit(1);
            }
          }

          console.log(`exit_code=${exitCode}`);
          console.log(`sarif_path=${sarifPath}`);
          console.log(`sarif_exists=${sarifExists}`);
          console.log(`findings_count_filtered=${findings}`);
          console.log('Top findings metadata (toi da 5):');
          if (top.length === 0) {
            console.log('(khong co metadata finding de in)');
          } else {
            for (const t of top) {
              console.log(`ruleId=${t.ruleId}; uri=${t.uri}; line=${t.line}; self=${t.self}`);
            }
          }

          const code = String(exitCode || '0');
          if (findings > 0) {
            console.log('Phat hien bi mat, dung workflow.');
            process.exit(2);
          } else if (code !== '' && code !== '0') {
            console.log(`Gitleaks loi ha tang/cau hinh (code=${code}).`);
            process.exit(Number(code) || 1);
          } else {
            console.log('Khong co phat hien, tiep tuc.');
            process.exit(0);
          }
          NODE
      - name: Tạo snapshot zip + manifest
        run: |
          bash tools/export_repo_snapshot.sh --mode snapshot
          mkdir -p artifacts
          mv repo_snapshot.zip repo_manifest.txt artifacts/
      - name: Kiểm tra artifacts
        run: |
          ls -la artifacts
          test -f artifacts/repo_snapshot.zip
          test -f artifacts/repo_manifest.txt
      - name: Debug thư mục trước khi upload
        run: |
          pwd
          ls -la
          ls -la artifacts || true
          find artifacts -maxdepth 2 -type f -print || true
      - name: Tải artifact snapshot
        uses: actions/upload-artifact@v4
        with:
          name: repo-snapshot-index
          if-no-files-found: error
          path: |
            DOC/REPO_SNAPSHOT.md
            DOC/REPO_SNAPSHOT_INDEX.json
            DOC/REPO_SNAPSHOT_FULL.md
            DOC/REPO_SNAPSHOT_FULL_INDEX.json
      - name: Tải artifact source
        uses: actions/upload-artifact@v4
        with:
          name: repo-snapshot-source
          if-no-files-found: error
          path: |
            artifacts/repo_snapshot.zip
            artifacts/repo_manifest.txt
