name: Repo Snapshot

on:
  pull_request:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ops-commit
  cancel-in-progress: false

jobs:
  snapshot_pr:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node tools/repo_snapshot.mjs
      - run: node tools/repo_textdump.mjs
      - name: Đảm bảo commit before tồn tại
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          BEFORE="${{ github.event.before }}"
          if [ -n "${BEFORE}" ] && ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            git fetch --no-tags --prune --depth=0 origin "${BEFORE}"
          fi
      - name: Cài gitleaks CLI (v8.24.3)
        shell: bash
        run: |
          set -euo pipefail
          curl -sSL -o /tmp/gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Chuẩn bị commit range cho gitleaks (tự chữa)
        id: gitleaks_range
        shell: bash
        run: |
          set -euo pipefail
          git rev-parse --is-shallow-repository
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          RANGE=""
          if [ -n "${BASE}" ] && [ -n "${HEAD}" ]; then
            if git cat-file -e "${BASE}^{commit}" 2>/dev/null && git cat-file -e "${HEAD}^{commit}" 2>/dev/null; then
              RANGE="${BASE}..${HEAD}"
            fi
          fi
          if [ -z "${RANGE}" ]; then
            echo "range=" >> "$GITHUB_OUTPUT"
          else
            echo "range=${RANGE}" >> "$GITHUB_OUTPUT"
          fi
      - name: Debug gitleaks range
        shell: bash
        run: |
          echo "Gitleaks commit range: '${{ steps.gitleaks_range.outputs.range }}'"
      - name: Quét bí mật trước khi xuất snapshot
        id: gitleaks_scan
        shell: bash
        continue-on-error: true
        run: |
          set -euo pipefail
          SARIF_PATH="${RUNNER_TEMP}/gitleaks/gitleaks-results.sarif"
          mkdir -p "$(dirname "$SARIF_PATH")"
          RANGE="${{ steps.gitleaks_range.outputs.range }}"
          code=0
          if [ -n "${RANGE}" ]; then
            gitleaks detect --redact --config=.gitleaks.toml --gitleaks-ignore-path=.gitleaksignore --report-format=sarif --report-path="${SARIF_PATH}" --log-level=info --log-opts="${RANGE}" || code=$?
          else
            gitleaks detect --redact --config=.gitleaks.toml --gitleaks-ignore-path=.gitleaksignore --report-format=sarif --report-path="${SARIF_PATH}" --log-level=info || code=$?
          fi
          echo "sarif_path=${SARIF_PATH}" >> "$GITHUB_OUTPUT"
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
      - name: Kiểm tra file SARIF trước khi tải
        if: always()
        shell: bash
        run: |
          sarif_path="${{ steps.gitleaks_scan.outputs.sarif_path }}"
          if [ -n "${sarif_path}" ] && [ -f "${sarif_path}" ]; then
            echo "Tim thay ${sarif_path}; se upload artifact."
          else
            echo "Khong tim thay file SARIF de upload (sarif_path=${sarif_path:-<empty>})."
          fi
      - name: Tải kết quả gitleaks
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-snapshot-gitleaks
          if-no-files-found: warn
          path: ${{ steps.gitleaks_scan.outputs.sarif_path }}
      - name: Đánh giá kết quả gitleaks
        shell: bash
        run: |
          code="${{ steps.gitleaks_scan.outputs.exit_code }}"
          sarif_path="${{ steps.gitleaks_scan.outputs.sarif_path }}"
          sarif_exists=false
          findings_count_filtered=0

          if [ -n "${sarif_path}" ] && [ -f "${sarif_path}" ]; then
            sarif_exists=true
            findings_count_filtered="$(node -e 'const fs=require("fs"); const path=require("path"); const p=process.argv[1]; let c=0; try { const d=JSON.parse(fs.readFileSync(p,"utf8")); const reportBase=path.basename(p || ""); const runs=Array.isArray(d?.runs)?d.runs:[]; for (const run of runs) { const results=Array.isArray(run?.results)?run.results:[]; for (const r of results) { const uri=r?.locations?.[0]?.physicalLocation?.artifactLocation?.uri || ""; const uriBase=path.basename(String(uri)); if (uriBase !== reportBase) c += 1; } } } catch (err) { process.exit(3); } process.stdout.write(String(c));' "${sarif_path}")"
            parse_code=$?
            if [ "${parse_code}" -ne 0 ]; then
              echo "Khong doc duoc SARIF (parse_code=${parse_code})."
              findings_count_filtered=0
              if [ -z "${code}" ] || [ "${code}" = "0" ]; then
                code="${parse_code}"
              fi
            fi
          fi

          echo "exit_code=${code:-<empty>}"
          echo "sarif_path=${sarif_path}"
          echo "sarif_exists=${sarif_exists}"
          echo "findings_count_filtered=${findings_count_filtered}"

          if [ "${sarif_exists}" = "true" ] && [ "${findings_count_filtered}" -gt 0 ]; then
            echo "Top findings metadata (toi da 5):"
            node -e 'const fs=require("fs"); const path=require("path"); const p=process.argv[1]; try { const d=JSON.parse(fs.readFileSync(p,"utf8")); const reportBase=path.basename(p || ""); const runs=Array.isArray(d?.runs)?d.runs:[]; let shown=0; outer: for (const run of runs) { const results=Array.isArray(run?.results)?run.results:[]; for (const r of results) { const uri=r?.locations?.[0]?.physicalLocation?.artifactLocation?.uri || ""; const line=r?.locations?.[0]?.physicalLocation?.region?.startLine || ""; if (path.basename(String(uri)) === reportBase) continue; console.log(`ruleId=${r?.ruleId || ""}; uri=${uri}; line=${line}`); shown += 1; if (shown >= 5) break outer; } } if (shown === 0) console.log("(khong co metadata finding de in)"); } catch (err) { console.log("(khong doc duoc metadata tu SARIF)"); }' "${sarif_path}" || true
            echo "Phat hien bi mat, dung workflow."
            exit 2
          fi

          if [ -z "${code}" ] || [ "${code}" != "0" ]; then
            effective_code="${code:-1}"
            echo "Gitleaks loi ha tang/cau hinh (code=${effective_code})."
            echo "Hay kiem tra log buoc quet va artifact 'repo-snapshot-gitleaks' (${sarif_path})."
            exit "${effective_code}"
          fi

          echo "Gitleaks: khong phat hien nghi van bi mat."
          exit 0
      - name: Tạo snapshot zip + manifest
        run: |
          bash tools/export_repo_snapshot.sh --mode snapshot
          mkdir -p artifacts
          mv repo_snapshot.zip repo_manifest.txt artifacts/
      - name: Kiểm tra artifacts
        run: |
          ls -la artifacts
          test -f artifacts/repo_snapshot.zip
          test -f artifacts/repo_manifest.txt
      - name: Debug thư mục trước khi upload
        run: |
          pwd
          ls -la
          ls -la artifacts || true
          find artifacts -maxdepth 2 -type f -print || true
      - name: PR snapshot summary
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const data = JSON.parse(fs.readFileSync("DOC/REPO_SNAPSHOT_INDEX.json", "utf8"));
          const ext = Object.entries(data.stats?.extCounts || {})
            .sort((a, b) => b[1] - a[1])
            .slice(0, 5)
            .map(([k, v]) => `- ${k}: ${v}`)
            .join("\n") || "- (kh\u00f4ng c\u00f3)";
          const ignored = [
            ...(data.ignored?.dirs || []).map((p) => `- ${p}/`),
            ...(data.ignored?.partialDirs || []).map((p) => `- ${p}/ (b\u1ecf qua file con)`)
          ];
          const summary = [
            "### \u1ea2nh ch\u1ee5p kho m\u00e3 (Snapshot)",
            `- Tham chi\u1ebfu: ${process.env.GITHUB_REF || ""}`,
            `- T\u1ed5ng s\u1ed1 t\u1ec7p: ${data.stats?.totalFiles ?? 0}`,
            `- T\u1ed5ng s\u1ed1 th\u01b0 m\u1ee5c: ${data.stats?.totalDirs ?? 0}`,
            "",
            "Top 5 \u0111u\u00f4i t\u1ec7p:",
            ext,
            "",
            "Danh s\u00e1ch b\u1ecf qua:",
            ignored.length ? ignored.join("\n") : "- (kh\u00f4ng c\u00f3)",
            "",
            "Artifact: REPO_SNAPSHOT.md"
          ].join("\n");
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary + "\n");
          NODE
      - uses: actions/upload-artifact@v4
        with:
          name: repo-snapshot-index
          if-no-files-found: error
          path: |
            DOC/REPO_SNAPSHOT.md
            DOC/REPO_SNAPSHOT_INDEX.json
            DOC/REPO_SNAPSHOT_FULL.md
            DOC/REPO_SNAPSHOT_FULL_INDEX.json
      - uses: actions/upload-artifact@v4
        with:
          name: repo-snapshot-source
          if-no-files-found: error
          path: |
            artifacts/repo_snapshot.zip
            artifacts/repo_manifest.txt

  snapshot_main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, 'docs(snapshot):') && !contains(github.event.head_commit.message, '[skip snapshot]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node tools/repo_snapshot.mjs
      - run: node tools/repo_textdump.mjs
      - name: Đảm bảo commit before tồn tại
        if: github.event_name == 'push'
        shell: bash
        run: |
