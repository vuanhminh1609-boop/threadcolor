<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tra mã chỉ theo màu</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-4">Tra mã chỉ theo màu</h1>

    <!-- Chọn màu -->
    <section class="mb-6">
      <h3 class="text-lg font-semibold mb-2">Chọn màu trực tiếp</h3>
      <div class="flex items-center gap-4 flex-wrap">
        <input type="color" id="colorPicker" class="border rounded p-1 w-16 h-10" />
        <input type="number" id="resultCount" value="3" min="1" max="10"
               class="border rounded px-2 py-1 w-24" placeholder="Số kết quả" />
        <button id="btnFindNearest"
                class="bg-blue-600 text-white px-4 py-2 rounded-lg shadow-md hover:bg-blue-800 transition-transform transform hover:scale-105">
          Tìm mã chỉ gần nhất
        </button>
        <button id="btnFindAllBrands"
                class="bg-green-600 text-white px-4 py-2 rounded-lg shadow-md hover:bg-green-800 transition-transform transform hover:scale-105">
          Tìm tất cả hãng chỉ gần giống
        </button>
      </div>
    </section>

    <!-- Tra theo mã chỉ -->
    <section class="mb-6">
      <h3 class="text-lg font-semibold mb-2">Tra theo mã chỉ</h3>
      <div class="flex items-center gap-4 flex-wrap">
        <input type="text" id="codeInput" placeholder="Ví dụ: DMC 310"
               class="border rounded px-2 py-1 w-48" />
        <button id="btnFindByCode"
                class="bg-purple-600 text-white px-4 py-2 rounded-lg shadow-md hover:bg-purple-800 transition-transform transform hover:scale-105">
          Tìm màu theo mã
        </button>
      </div>
    </section>

    <!-- Kết quả -->
    <section id="result" class="mt-6"></section>
  </div>

  <!-- Scripts -->
  <script src="script.js"></script>
  <script src="multi-brand-grouped.js"></script>
</body>
</html>
